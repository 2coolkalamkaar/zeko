name: Python K8s CI/CD Pipeline

# This replaces `agent any`. It tells GitHub to run this pipeline 
# automatically whenever code is pushed to the 'main' branch.
on:
  push:
    branches: [ "main" ]

# This replaces the Jenkins environment{} block
env:
  DOCKER_IMAGE: kalamkaar/python-k8s-starter
  SONAR_PROJECT_KEY: python-app

jobs:
  build-and-push:
    # This tells GitHub to spin up a fresh, temporary Ubuntu server for this run
    runs-on: ubuntu-latest

    steps:
      # Stage 1: Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Stage 2: SonarQube Analysis
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}

      # Stage 3: Docker Login
      # Replaces the Jenkins withCredentials() block
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Stage 4: Docker Build and Push
      # We use github.run_number as the exact equivalent to Jenkins BUILD_NUMBER
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.run_number }}
            ${{ env.DOCKER_IMAGE }}:latest

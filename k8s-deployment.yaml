apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-deployment
  labels:
    app: python-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-app
        image: kalamkaar/python-k8s-app:v1.1
        ports:
        - containerPort: 5000
        env:
        - name: ENV
          value: "production"
        - name: OTEL_SERVICE_NAME
          value: "python-flask-app"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://my-release-signoz-otel-collector.monitoring.svc.cluster.local:4317"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: python-app-service
spec:
  selector:
    app: python-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
  type: NodePort
